<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configure Salesforce</title>
    <link rel="stylesheet" href="https://cdn.replit.com/agent/bootstrap-agent-dark-theme.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/themes/enhanced-dark.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/custom.css') }}">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand text-enhanced" href="{{ url_for('index') }}">
                <i class="bi bi-cloud-lightning-fill me-2"></i>
                Salesforce Data Generator
            </a>
            <div class="d-flex">
                <a href="{{ url_for('configure') }}" class="btn btn-outline-secondary btn-sm me-2">Open Standard View</a>
                {% if session.get('salesforce_org_id') %}
                    <a href="{{ url_for('logout') }}" class="btn btn-outline-danger btn-sm">Disconnect</a>
                {% else %}
                    <a href="{{ url_for('login') }}" class="btn btn-outline-primary btn-sm">Connect to Salesforce</a>
                {% endif %}
            </div>
        </div>
    </nav>
    <main class="container-fluid py-4">
        <div class="row justify-content-center">
            <div class="col-12 col-xxl-10">
                <div class="card shadow">
                    <div class="card-header bg-primary text-white">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <h3 class="card-title mb-0">Configure Salesforce with Smart Analysis</h3>
                                <small class="opacity-75">Standalone configuration page</small>
                            </div>
                            <a href="{{ url_for('configure') }}" class="btn btn-light btn-sm">Standard Page</a>
                        </div>
                    </div>
                    <div class="card-body">
                        <iframe
                            src="{{ url_for('configure') }}"
                            title="Configure Salesforce"
                            style="width: 100%; min-height: 88vh; border: 0; border-radius: .5rem;"
                        ></iframe>
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
