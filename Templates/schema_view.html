<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Salesforce Objects Search</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-light">

<div class="container mt-4">
  <h3 class="mb-3">Salesforce Objects</h3>

  <!-- Search Input -->
  <input 
    type="text" 
    id="objectSearch" 
    class="form-control bg-dark text-light mb-3" 
    placeholder="Search objects..."
  >

  <!-- Object List -->
  <div id="objectList" style="max-height: 400px; overflow-y: auto;">
    {% for obj in objects %}
      <div 
        class="object-item btn btn-outline-light w-100 text-start mb-2 d-flex justify-content-between align-items-center" 
        data-object-label="{{ obj.label | lower }}"
      >
        {{ obj.label }}
        <span class="badge {% if obj.custom %}bg-success{% else %}bg-secondary{% endif %}">
          {% if obj.custom %}Custom{% else %}Standard{% endif %}
        </span>
      </div>
    {% endfor %}
  </div>

  <p id="noResults" class="text-muted mt-3" style="display: none;">No objects match your search.</p>
</div>

<script>
document.addEventListener("DOMContentLoaded", function () {
  const searchInput = document.getElementById("objectSearch");
  const objectItems = document.querySelectorAll(".object-item");
  const noResults = document.getElementById("noResults");

  searchInput.addEventListener("input", function () {
    const query = this.value.trim().toLowerCase();
    let visibleCount = 0;

    objectItems.forEach(item => {
      const label = item.getAttribute("data-object-label");
      const isVisible = label.includes(query);
      item.style.display = isVisible ? "flex" : "none";
      if (isVisible) visibleCount++;
    });

    noResults.style.display = visibleCount === 0 ? "block" : "none";
  });
});
</script>

</body>
</html>
